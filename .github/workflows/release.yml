name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: rkg
  CARGO_TERM_COLOR: always

jobs:
  meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Read version from Cargo.toml
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          if [[ -z "$version" ]]; then
            echo "Failed to read version from Cargo.toml" >&2
            exit 1
          fi
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" && "v$version" != "${{ github.ref_name }}" ]]; then
            echo "Tag ${{ github.ref_name }} does not match Cargo.toml version v$version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

  build:
    name: Build ${{ matrix.name }}
    needs:
      - meta
      - test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          asset="${BIN_NAME}-${version}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${BIN_NAME}"
          tar -C dist -czf "${asset}.tar.gz" "${BIN_NAME}"
          shasum -a 256 "${asset}.tar.gz" > "${asset}.tar.gz.sha256"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.meta.outputs.version }}"
          $asset = "${env:BIN_NAME}-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" "dist/${env:BIN_NAME}.exe"
          Compress-Archive -Path "dist/${env:BIN_NAME}.exe" -DestinationPath "$asset.zip" -Force
          $hash = (Get-FileHash "$asset.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $asset.zip" | Out-File "$asset.zip.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            *.${{ matrix.archive_ext }}
            *.${{ matrix.archive_ext }}.sha256

  publish:
    name: Publish Release
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f -maxdepth 2 -exec cp {} release-assets/ \;

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: release-assets/*
          generate_release_notes: true
